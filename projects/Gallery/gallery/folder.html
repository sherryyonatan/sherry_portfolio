<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>תיקיית תמונות</title>
  <link rel="stylesheet" href="../shared/styles.css" />
</head>

<body>
  <header class="site-header sticky-header">
    <div>
      <p class="eyebrow">Folder View</p>
      <h1 id="folderTitle">תיקייה</h1>
    </div>

    <div class="header-actions">
      <a href="../index.html" class="secondary-btn back-link">
        חזור לעמוד הבית
      </a>

      <button id="openImageModalBtn" class="primary-btn">
        + הוספת תמונה
      </button>
    </div>
  </header>

  <main class="page-shell folder-shell">
    <section class="card">
      <div class="section-head folder-head">
        <div class="folder-head-text">
          <p class="eyebrow">Timeline</p>
          <h2>ציר התמונות</h2>
          <p id="folderDescription" class="section-note"></p>
        </div>
      </div>

      <div id="galleryGrid" class="gallery-grid"></div>
    </section>
  </main>

  <div id="imageModal" class="modal hidden">
    <div class="modal-box wide-modal">
      <button class="close-modal" data-close="imageModal">×</button>
      <h3>הוספת תמונה חדשה</h3>

      <form id="newImageForm" class="modal-form two-columns">
        <label>
          <span>כותרת</span>
          <input type="text" id="imageTitle" required />
        </label>

        <label>
          <span>תאריך</span>
          <input type="date" id="imageDate" required />
        </label>

        <label class="full-width">
          <span>תיאור</span>
          <textarea id="imageDescription" rows="3" required></textarea>
        </label>

        <label class="full-width">
          <span>תמונה</span>
          <input type="file" id="imageFile" accept="image/*" required />
        </label>

        <button type="submit" class="primary-btn full-width">
          שמור תמונה
        </button>
      </form>
    </div>
  </div>

  <div id="imageLightbox" class="insta-lightbox hidden">
    <div class="insta-modal">
      <button id="closeLightbox" class="close-lightbox">×</button>

      <div class="insta-modal-image-side">
        <img id="lightboxImage" src="" alt="תמונה מוגדלת" />
      </div>

      <div class="insta-modal-info-side">
        <div class="insta-post-header">
          <div class="insta-user-meta">
            <strong id="lightboxFolderName">sherry_yonatan</strong>
            <span id="lightboxLocation">ישראל</span>
          </div>
        </div>

        <div class="insta-scroll-area">
          <div class="insta-caption-block">
            <div class="insta-caption-content">
              <strong id="lightboxTitle">כותרת</strong>
              <p id="lightboxDescription">תיאור תמונה</p>
              <span id="lightboxDate" class="insta-post-date">1 בינואר 2025</span>
            </div>
          </div>
        </div>

        <div class="insta-actions-bar">
  <div class="insta-actions-right">

     <!-- לב -->
    <button id="lightboxLikeBtn" class="insta-icon-btn" type="button" aria-label="לייק">
      <svg class="insta-action-icon" viewBox="0 0 24 24" fill="none">
        <path d="M16.792 3.904A4.989 4.989 0 0 0 12 5.892a4.989 4.989 0 0 0-4.792-1.988C4.706 4.148 3 6.143 3 8.723c0 3.12 2.873 5.844 7.227 9.86l.773.71a1 1 0 0 0 1.35 0l.773-.71C18.127 14.567 21 11.843 21 8.723c0-2.58-1.706-4.575-4.208-4.819Z"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <!-- תגובה -->
    <button id="lightboxCommentBtn" class="insta-icon-btn" type="button" aria-label="תגובה">
      <svg class="insta-action-icon" viewBox="0 0 24 24" fill="none">
        <path d="M21 11.5a8.38 8.38 0 0 1-8.5 8.5 8.9 8.9 0 0 1-4-.9L3 21l1.1-5.1a8.4 8.4 0 0 1-.9-3.9A8.38 8.38 0 0 1 11.7 3.5H12A8.5 8.5 0 0 1 21 11.5Z"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <!-- הורדה -->
    <a id="lightboxDownloadBtn" class="insta-icon-btn insta-download-btn" href="#" download aria-label="הורדת תמונה">
      <svg class="insta-action-icon" viewBox="0 0 24 24" fill="none">
        <path d="M12 3v11" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <path d="M7 11l5 5 5-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M5 21h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </a>
    <!-- פח -->
    <button id="deletePhotoBtn" class="insta-icon-btn insta-delete-btn" type="button" aria-label="מחיקת תמונה">
      <svg class="insta-action-icon" viewBox="0 0 24 24" fill="none">
        <path d="M3 6h18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <path d="M8 6V4h8v2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <path d="M19 6l-1 14H6L5 6" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
        <path d="M10 11v6M14 11v6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </button>

  </div>
</div>

        <div class="insta-likes-row">
          <strong id="lightboxLikes">0 לייקים</strong>
        </div>

        <div id="lightboxComments" class="insta-comments-list"></div>

        <form id="lightboxCommentForm" class="insta-comment-form">
          <input type="text" id="lightboxCommentInput" placeholder="הוספת תגובה..." required />
          <button type="submit">פרסום</button>
        </form>
      </div>
    </div>
  </div>

  <div id="successToast" class="success-toast hidden">
    התמונה שלך נוספה בהצלחה! 🎉
  </div>

  <script src="../shared/common.js"></script>
  <script src="folder.js"></script>
</body>
</html>
